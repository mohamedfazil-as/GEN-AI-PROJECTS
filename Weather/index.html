<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One UI Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <div class="bg-orb orb-one"></div>
    <div class="bg-orb orb-two"></div>

    <main class="container weather-app py-4 py-md-5">
      <header class="top-bar card-surface fade-in-up">
        <div class="top-bar-title">
          <p class="eyebrow mb-1">Weather Prediction</p>
          <h1 class="h4 mb-0">One UI Weather</h1>
        </div>

        <form id="searchForm" class="search-wrap" autocomplete="off">
          <div class="search-input-wrap">
            <input
              id="cityInput"
              type="text"
              class="form-control search-input"
              placeholder="Search city (e.g., Chennai)"
              aria-label="Search city weather"
              required
            >
            <button class="btn btn-search" type="submit">Search</button>
          </div>
        </form>

        <div class="actions-wrap">
          <div class="unit-toggle" role="group" aria-label="Temperature unit toggle">
            <button id="celsiusBtn" type="button" class="unit-btn active">°C</button>
            <button id="fahrenheitBtn" type="button" class="unit-btn">°F</button>
          </div>
          <button id="refreshBtn" type="button" class="btn btn-refresh">Refresh</button>
        </div>
      </header>

      <section id="loadingState" class="loading-card card-surface fade-in-up d-none" aria-live="polite">
        <div class="loader-ring" aria-hidden="true"></div>
        <p class="mb-0">Updating weather details...</p>
      </section>

      <section id="errorState" class="error-card card-surface fade-in-up d-none" aria-live="assertive">
        <h2 class="h6 mb-2">Could not load weather</h2>
        <p id="errorMessage" class="mb-0">Please try again.</p>
      </section>

      <section id="weatherContent" class="d-none">
        <section class="hero card-surface fade-in-up">
          <div class="hero-main">
            <div>
              <p id="cityName" class="city-name mb-1">--</p>
              <p id="localTime" class="local-time mb-0">Local time --</p>
            </div>
            <img id="conditionIcon" class="condition-icon" src="" alt="Weather icon">
          </div>

          <div class="temp-wrap">
            <p id="currentTemp" class="current-temp mb-0">--°</p>
            <p id="conditionText" class="condition-text mb-0">--</p>
          </div>

          <div class="stats-grid">
            <article class="stat-pill">
              <p class="stat-label mb-1">Feels Like</p>
              <p id="feelsLike" class="stat-value mb-0">--</p>
            </article>
            <article class="stat-pill">
              <p class="stat-label mb-1">Humidity</p>
              <p id="humidity" class="stat-value mb-0">--</p>
            </article>
            <article class="stat-pill">
              <p class="stat-label mb-1">Wind</p>
              <p id="windSpeed" class="stat-value mb-0">--</p>
            </article>
            <article class="stat-pill">
              <p class="stat-label mb-1">Last Updated</p>
              <p id="lastUpdated" class="stat-value mb-0">--</p>
            </article>
          </div>
        </section>

        <section class="insight card-surface fade-in-up">
          <div class="insight-head">
            <div>
              <p class="eyebrow mb-1">Smart Insight</p>
              <h2 class="h5 mb-0">Today at a glance</h2>
            </div>
            <span id="insightIcon" class="insight-icon" aria-hidden="true">🌤️</span>
          </div>
          <p id="insightText" class="insight-text mb-0">Fetching advice...</p>
        </section>

        <section class="forecast card-surface fade-in-up">
          <div class="section-head">
            <h2 class="h5 mb-0">Hourly Forecast</h2>
          </div>
          <div id="hourlyContainer" class="hourly-scroll" aria-label="Hourly forecast list"></div>
        </section>

        <section class="forecast card-surface fade-in-up">
          <div class="section-head">
            <h2 class="h5 mb-0">7-Day Forecast</h2>
          </div>
          <div id="dailyContainer" class="daily-grid"></div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="./app.js"></script>
</body>
</html>
