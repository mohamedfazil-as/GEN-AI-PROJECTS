<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart News</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5.3.8 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg px-4 sticky-top animate__animated animate__fadeInDown">
  <span class="navbar-brand fw-semibold">📰 Smart News</span>

  <div class="ms-auto w-25">
    <input
      type="text"
      id="searchInput"
      class="form-control"
      placeholder="Search breaking news..."
    >
  </div>
</nav>

<!-- Category Buttons -->
<div class="container-fluid px-4 mt-3">
  <div class="d-flex flex-wrap gap-2 category-wrapper">

    <button class="btn category-btn active" data-category="all">All</button>
    <button class="btn category-btn" data-category="technology">Technology</button>
    <button class="btn category-btn" data-category="business">Business</button>
    <button class="btn category-btn" data-category="sports">Sports</button>
    <button class="btn category-btn" data-category="health">Health</button>
    <button class="btn category-btn" data-category="science">Science</button>

  </div>
</div>

<!-- News Section -->
<div class="container-fluid px-4 mt-4">
  <div class="row" id="newsContainer"></div>
</div>

<!-- Scroll to Top -->
<button id="scrollTopBtn">↑</button>

<!-- JS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="script.js"></script>

<script>
  AOS.init({ duration: 800, once: true });

  // Scroll-to-top
  const btn = document.getElementById("scrollTopBtn");
  window.onscroll = () => {
    btn.style.display = window.scrollY > 300 ? "block" : "none";
  };
  btn.onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });
</script>

</body>
</html>
